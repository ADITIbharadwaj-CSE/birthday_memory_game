</script>  <div class="container" id="main">

</div>  <script>  
  
let photos1 = [  
"photo1.jpg.jpeg","photo2.jpg.jpeg","photo3.jpg.jpeg",  
"photo4.jpg.jpeg","photo5.jpg.jpeg","photo6.jpg.jpeg"  
];  
  
let photos2 = [

"photo13.jpg.jpeg","photo14.jpg.jpeg","photo15.jpg.jpeg",

];  
  
let level=1, first=null, second=null, lock=false;  
  
function startGame(){  
  level=1;  
  loadLevel();  
}  
  
function loadLevel(){  
  
  let photos=(level==1)?photos1:photos2;  
  let cards=[...photos,...photos].sort(()=>0.5-Math.random());  
  
  let grid=cards.map(p=>`  
    <div class="card" onclick="flip(this,'${p}')">  
      <div class="inner">  
        <div class="front">?</div>  
        <div class="back"><img src="${p}"></div>  
      </div>  
    </div>  
  `).join("");  
  
  document.getElementById("main").innerHTML=`  
    <div class="container">  
      <h3 class="shine";style="color:#ff4d88; margin-bottom:5px;">
🎂🎉happy B'DAY Tushii🎉🎂
</h3>

<h2>Level ${level}</h2>
<P>Match the card to unlock the surprise🎁</p>
      <div class="grid">${grid}</div>  
    </div>  
  `;  
}  
  
function flip(el,img){  
  
  if(lock) return;  
  
  let inner=el.querySelector(".inner");  
  if(inner.classList.contains("flip")) return;  
  
  inner.classList.add("flip");  
  
  if(!first){  
    first=el;  
  } else {  
    second=el;  
    lock=true;  
  
    let img1=first.querySelector("img").src;  
    let img2=second.querySelector("img").src;  
  
    if(img1===img2){  
      first.classList.add("matched");  
      second.classList.add("matched");  
      first=null; second=null; lock=false;  
      checkWin();  
    } else {  
      setTimeout(()=>{  
        first.querySelector(".inner").classList.remove("flip");  
        second.querySelector(".inner").classList.remove("flip");  
        first=null; second=null; lock=false;  
      },800);  
    }  
  }  
}  
  
function checkWin(){  
  
  let all=document.querySelectorAll(".card");  
  let win=[...all].every(c=>c.classList.contains("matched"));  
  
  if(win){  
    if(level==1){  
      level=2;  
      document.getElementById("main").innerHTML=`  
      <div class="container">  
      <h2>🎉congratulations Level 1 Complete🎉</h2>  
      <button onclick="burstEmoji('🥰');loadLevel()">Start Level 2</button>  
      </div>`;  
    } else {  
      document.getElementById("main").innerHTML=`  
      <div class="container">  
      <h2>🎉 congratulations Level 2 Complete 🎉</h2>  
      <button onclick="burstEmoji('🎁');showPhotos()">Unlock Gift 🎁</button>  
      </div>`;  
    }  
  }  
}

let selected=false;  
  
function selectFeedback(btn,emoji){  
  
if(selected) return;  
selected=true;  
  
btn.style.boxShadow="0 0 20px gold";  
btn.style.transform="scale(1.1)";  
  
for(let i=0;i<25;i++){

function burstEmoji(emoji) {
  for (let i = 0; i < 25; i++) {

    let e = document.createElement("div");
    e.innerText = emoji;

    e.style.position = "fixed";
    e.style.left = "50%";

    e.style.fontSize = "22px";
    e.style.pointerEvents = "none";

    document.body.appendChild(e);

    let x = (Math.random() - 0.5) * 300;
    let y = (Math.random() - 0.5) * 300;

    e.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }

    });

  }
}
